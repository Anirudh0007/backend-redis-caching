version: "3.9"

services:
  redis:
    image: redis
    container_name: redis-server
    ports:
      - "6379:6379"

  mongo:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - mongo
      - redis
    env_file:
    - .env

volumes:
  mongo-data: